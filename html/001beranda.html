<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Edukasi dengan Shape dan WordArt</title>
	<link rel="apple-touch-icon" sizes="180x180" href="../img/favicon_io/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="../img/favicon_io/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="../img/favicon_io/favicon-16x16.png">
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: #222222;
			background-size: 100%;
			user-select: none;
			-webkit-user-select: none;
		}
		.btn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 250px; 
			height: 50px; 
			/*background-color: #ff0000;*/
			/*opacity: 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
		.myimg {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 10px; 
			height: 10px; 
			/*background-color: #ff0000;*/
			/*opacity : 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	
	<div class ="bg" id="bg">
		<div class="btn" id="btn1"></div>
		<div class="btn" id="btn2"></div>
		<div class="btn" id="btn3"></div>
		<div class="btn" id="btn4"></div>
		<div class="btn" id="btn5"></div>
	</div>
	<script>
		const myBG = document.getElementById('bg');
		const btn1 = document.getElementById('btn1');
		const btn2 = document.getElementById('btn2');
		const btn3 = document.getElementById('btn3');
		const btn4 = document.getElementById('btn4');
		const btn5 = document.getElementById('btn5');
		bg.style.backgroundImage = "url(../img/001-beranda.png)";
		btn1.style.backgroundImage = "url(../img/btn0_1.png)";
		btn2.style.backgroundImage = "url(../img/btn0_2.png)";
		btn3.style.backgroundImage = "url(../img/btn0_3.png)";
		btn4.style.backgroundImage = "url(../img/btn0_4.png)";
		btn5.style.backgroundImage = "url(../img/btn0_5.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		function XYbenda(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			btn1.style.left = ''+(295)+'px';
			btn1.style.top = ''+(120)+'px';
			btn2.style.left = ''+(295)+'px';
			btn2.style.top = ''+(180)+'px';
			btn3.style.left = ''+(295)+'px';
			btn3.style.top = ''+(240)+'px';
			btn4.style.left = ''+(295)+'px';
			btn4.style.top = ''+(300)+'px';
			btn5.style.left = ''+(295)+'px';
			btn5.style.top = ''+(360)+'px';
		}
		
		XYbenda(); // mengatur posisi x dan y
		btn1.addEventListener('click', () => {location.href = "010petunjuk.html";});
		btn2.addEventListener('click', () => {location.href = "020atp.html";});
		btn3.addEventListener('click', () => {location.href = "031materi.html";});
		btn4.addEventListener('click', () => {location.href = "041klikinsert.html";});
		btn5.addEventListener('click', () => {location.href = "050pengembang.html";});
		
	</script>
	
	<script>
	</script>
	<script>
		
		var fixzoom,fixscale;
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(){
			XYbenda();
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow();
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
	</script>
</body>
</html>
