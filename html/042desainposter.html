	<script>
		var selectedEl = null;
        function selectElement(el) {
            if (selectedEl) {
                selectedEl.classList.remove('selected-element');
            }
            selectedEl = el;
            selectedEl.classList.add('selected-element');
        }
		
		function setupDraggable(el,xmax,ymax) {
			console.log(xmax,ymax);
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            el.addEventListener('mousedown', dragMouseDown);
            el.addEventListener('touchstart', dragTouchStart, { passive: false });

            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.addEventListener('mouseup', closeDragElement);
                document.addEventListener('mousemove', elementDrag);
            }

            function dragTouchStart(e) {
                selectElement(el);
                const touch = e.touches[0];
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                document.addEventListener('touchend', closeDragElement);
                document.addEventListener('touchmove', elementTouchDrag, { passive: false });
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;

                // Set positions and lock bounds inside poster page
                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                if (newLeft >= 0 && newLeft <= xmax) el.style.left = newLeft + "px";
                if (newTop >= 0 && newTop <= ymax) el.style.top = newTop + "px";
            }

            function elementTouchDrag(e) {
                e.preventDefault();
                const touch = e.touches[0];
                pos1 = pos3 - touch.clientX;
                pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX;
                pos4 = touch.clientY;

                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                if (newLeft >= 0 && newLeft <= xmax) el.style.left = newLeft + "px";
                if (newTop >= 0 && newTop <= ymax) el.style.top = newTop + "px";
            }

            function closeDragElement() {
                document.removeEventListener('mouseup', closeDragElement);
                document.removeEventListener('mousemove', elementDrag);
                document.removeEventListener('touchend', closeDragElement);
                document.removeEventListener('touchmove', elementTouchDrag);
            }
        }
	</script>

			ZoomAll();

		function UbahWindow(){
			XYbenda();

		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow();
		}
